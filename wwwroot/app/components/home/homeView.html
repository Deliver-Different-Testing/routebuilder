<div class="top-bar">
    <img src="../../../img/DFRNT-logo.png" class="logo" />

    <div class="searchBox">
        <input type="text" ng-model="searchBox" placeholder="Search..." ng-model-options="{debounce: 300}">
        <div class="results" ng-show="searchBox">
            <ul>
                <li class="result" ng-repeat="job in filteredJobs = ( runListCombined() | filter: searchBox) | limitTo:10" ng-mousedown="selectJob(job, true)">
                    {{job.JobNumber}}<br />
                    <small class="address">{{job.ToAddress}}</small>
                </li>
            </ul>
            <small ng-hide="filteredJobs.length">No results</small>
        </div>
    </div>

    <div class="topbar-buttons">
        <div class="btn btn-sm btn-primary topbar-button" ng-click="getData(1)"><i class="fa fa-sync"></i></div>
        <div class="dropdown topbar-button">
            <button class="btn btn-sm btn-primary dropdown-toggle" type="button" id="dropdownMenu1" data-toggle="dropdown" aria-haspopup="true" aria-expanded="true">
                Layout
                <span class="caret"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenu1">
                <li><a class="dropdown-item" href="#" ng-click="saveLayout()"><b>Save Layout</b></a></li>
                <li><a class="dropdown-item" href="#" ng-click="loadLayout($index)" ng-repeat="lo in layouts">{{lo.name}}</a></li>
            </ul>
        </div>
    </div>
</div>

<div class="">

    <div class="columns">

        <div class="column" ng-repeat="(colKey,column) in layout.columns" id="co-{{column.id}}" resizablelayout r-directions="['right']" r-flex="true" style="flex-basis: {{column.width}}">
            <div class="column-sortable" ng-model="column.boxes" ui-sortable="sortableOptions">
                <div class="box" ng-repeat="(boxName,box) in column.boxes" id="box-{{box.name}}" resizablelayout r-directions="['bottom']" r-flex="true" style="flex-basis: {{box.height}}">
                    <div class="box-bar">
                        <div class="box-bar-title">
                            {{boxes[box.name].title}}
                            <span ng-show="box.name == 'jobDetail'">{{currentSelection}}</span>
                            <span ng-show="box.name == 'runBuilder'">{{activeRunName}}</span>
                        </div>
                        <div class="box-buttons">

                            <div class="box-details" ng-show="box.name == 'groupedJobs'">
                                <div class="btn-group" role="group" aria-label="Basic example">
                                    <button type="button" class="btn btn-sm btn-secondary" title="Sync EH/HD" ng-click="syncHDJobs()"><i class="fa fa-sync"></i> Sync EH/HD</button>
                                </div>


                                <div class="btn-group" role="group" aria-label="Basic example">
                                    <button type="button" class="btn btn-sm btn-secondary" title="Pick date and service" ng-click="openPickDateService()">{{pickDateService.date}} &nbsp;<i class="fa fa-calendar-alt"></i></button>
                                    <button type="button" class="btn btn-sm btn-secondary" title="View By Time" ng-click="clearSortByTime()"><i class="fa fa-clock"></i></button>
                                    <!--<button type="button" class="btn btn-sm btn-secondary" title="More Than 100" ng-click="sortByMoreThan100()"><i class="fa fa-arrow-up"></i></button>-->
                                    <!--<button type="button" class="btn btn-sm btn-secondary" title="Less Than 100" ng-click="sortByLessThan100()"><i class="fa fa-arrow-down"></i></button>-->
                                    <button type="button" class="btn btn-sm btn-secondary" title="Sort By Post Code" ng-click="sortByPostCode()"><i class="fa fa-arrow-down"></i></button>
                                    <button type="button" class="btn btn-sm btn-secondary" title="Build Runs" ng-click="buildRunByPostalCode()"><i class="fas fa-route"></i></button>
                                </div>

                            </div>

                            <div class="box-details" ng-show="box.name == 'runList'">
                                <label class="checkbox-inline">
                                    <input type="checkbox" ng-model="routeSetting.autoRoute"> Auto Routing
                                </label>

                                <div class="btn-group" role="group" aria-label="Basic example">
                                    <button type="button" class="btn btn-sm btn-secondary" title="New Run" ng-click="newRun()"><i class="fa fa-plus"></i></button>
                                    <button type="button" class="btn btn-sm btn-secondary" title="Send to prebook" ng-click="sendTo('prebook')"><i class="fa fa-clock"></i></button>
                                    <button type="button" class="btn btn-sm btn-secondary" title="Send to live" ng-click="sendTo('/Job/InsertRunJobs')"><i class="fa fa-paper-plane"></i></button>
                                </div>
                            </div>


                            <div class="box-handle"><i class="fa fa-ellipsis-v"></i> </div>
                        </div>
                    </div>
                    <div class="box-content" ng-include="boxes[box.name].tpl"></div>
                </div>

            </div>
        </div>

    </div>

</div>



<div ng-include="'app/components/home/tpls/eventForm.tpl'"></div>

<div ng-include="'app/components/home/tpls/gatherForm.tpl'"></div>

<div ng-include="'app/components/home/tpls/gatherFormMulti.tpl'"></div>

<div ng-include="'app/components/home/tpls/pickDateForm.tpl'"></div>

<div ng-include="'app/components/home/tpls/gpsForm.tpl'"></div>

<div id='draggingItems'></div>

<script>
    document.onkeydown = overrideKeyboardEvent;
    document.onkeyup = overrideKeyboardEvent;
    var keyIsDown = {};

    $(document).on('focus', '.searchBox input', function () {
        $(".results").fadeIn(100);
    });
    $(document).on('blur', '.searchBox input', function () {
        $(".results").fadeOut(100);
    });


    function overrideKeyboardEvent(e) {
        switch (e.type) {
            case "keydown":
                if (!keyIsDown[e.keyCode]) {
                    keyIsDown[e.keyCode] = true;
                    // do key down stuff here
                    if (e.keyCode == 82 && e.ctrlKey) {
                        //location.reload();
                    }
                }
                break;
            case "keyup":
                delete (keyIsDown[e.keyCode]);
                // do key up stuff here
                break;
        }
        disabledEventPropagation(e);
        if (e.keyCode == 68 && e.ctrlKey) {
            e.preventDefault();
            return false;
        }
        if (e.keyCode == 65 && e.ctrlKey) {
            e.preventDefault();
            return false;
        }
    }

    function disabledEventPropagation(e) {
        if (e.keyCode == 68 && e.ctrlKey) {
            if (e.stopPropagation) {
                e.stopPropagation();
            } else if (window.event) {
                window.event.cancelBubble = true;
            }
        }
    }





    $(document).on('click', '.top-bar .btn-group .btn', function (event) {
        $(this).parent().find('.topBarActive').removeClass('topBarActive');
        $(this).addClass('topBarActive');
    });


    $(document).ready(function () {

        var isDown = false;   // Tracks status of mouse button

        $(document).mousedown(function () {
            isDown = true;      // When mouse goes down, set isDown to true
        })
            .mouseup(function () {
                isDown = false;    // When mouse goes up, set isDown to false
            });

        var isOnRow = false;





        $(document).on("mouseenter", ".activeTable .clickable-row", function (event) {

            if (event.ctrlKey) {
                if (isDown) {        // Only change css if mouse is down
                    $(this).addClass("active");
                }
            }

        });

        $(document).on("hover", ".activeTable .clickable-row", function (event) {
            isOnRow = true;
        });

        $(document).on("mouseleave", ".activeTable .clickable-row", function (event) {
            isOnRow = false;
        });

        $(document).on('click', '.box-content', function (event) {
            event.stopPropagation();
            if (isOnRow) {
                $(".activeTable .active").removeClass("active");
            }

        });

    });



    var mouseDown = 0;

    $(document).on('mousedown', '.clickable-row', function (event) {
        if ($(".activeTable .clickable-row.active").length > 1) {

            // Display Jobs when dragging from job list
            var dragableElementName = "Jobs";

            // Display Groups for dragging group of jobs into Run
            if (event.currentTarget.closest("table").id === "jobsGroup") {
                dragableElementName = "Groups";
            }

            var jobNo = $(".activeTable .clickable-row.active").length + " " + dragableElementName;
        } else {
            var jobNo = $(this).attr("data-jobno");
        }


        if (mouseDown == 0) {
            mouseDown = 1;

            if (event.which === 1) {
                if (event.ctrlKey) {
                    if ($(this).hasClass("active")) {
                        $(this).removeClass('active');
                    } else {
                        $(this).addClass('active');
                    }
                } else {
                    if (!$(this).hasClass("active")) {

                        var group = $(this).parents(".table-rows").attr("data-group");
                        $('*[data-group="' + group + '"]').each(function () {
                            $(this).find('.active').removeClass('active');
                        });

                        $(this).addClass('active');
                    }
                }

                $(".activeTable").removeClass("activeTable");
                $(this).parents(".table").addClass("activeTable");
            }

            if (!event.ctrlKey) {
                if ($(this).hasClass("draggable-row")) {

                    if (!$(this).hasClass("active")) {

                        var group = $(this).parents(".table-rows").attr("data-group");
                        $('*[data-group="' + group + '"]').each(function () {
                            $(this).find('.active').removeClass('active');
                        });
                        $(this).addClass('active');

                    }
                    setTimeout(function () {
                        if (mouseDown == 1) {
                            //debugger;
                            $("#draggingItems").show();
                            $("#draggingItems").html(jobNo);

                            $("#draggingItems").css({ "top": event.pageY - 25, "left": event.pageX - 50 });
                            $("#draggingItems").draggable();
                            $("#draggingItems").trigger(event);
                        }
                    }, 200);
                }
            }

        }

    });

    $(document).on('mouseup', '.clickable-row', function (event) {

        if (event.which === 3) {

            $(".rightActiveTable").removeClass("rightActiveTable");
            $(this).parents(".table").addClass("rightActiveTable");
        }
        if (!event.ctrlKey) {

            if ($(this).hasClass("active")) {
            } else {
                var group = $(this).parents(".table-rows").attr("data-group");

                $('*[data-group="' + group + '"]').each(function () {
                    $(this).find('.active').removeClass('active');
                });
                $(this).addClass('active');
            }

        }

    });



    $(document).on('click', '.clickable-row', function (event) {
        event.stopPropagation();
    });


    $(document).on("mouseup", function (ev) {
        $("#draggingItems").hide();
        mouseDown = 0;
    });

    $(document).on("keydown", function (e) {
        var code = (e.keyCode ? e.keyCode : e.which);
        if (code == 40) {
            $(".activeTable").find(".active").removeClass("active").next().addClass("active").mouseup().click();
        } else if (code == 38) {
            $(".activeTable").find(".active").removeClass("active").prev().addClass("active").mouseup().click();
        }
    });


    //var delay = 250; // delay between calls
    //var throttled = false; // are we currently throttled?

    //setTimeout(function(){ sizeHeadings($("#jobList").parents(".column")); }, 100);

    function sizeHeadings(ele) {

        $("body").find(".box").each(function () {
            var box = $(this);
            box.find(".table-headings thead tr th").each(function (index) {
                var newWidth = box.find(".table tbody tr td").eq(index).width();
                $(this).width(newWidth);
            });
            box.find(".table-headings table").width(box.find(".table").width());
        });

        $("body").find(".box").each(function () {
            var box = $(this);
            box.find(".table-b-headings thead tr th").each(function (index) {
                var newWidth = box.find(".table tbody tr td").eq(index).width();
                $(this).width(newWidth);
            });
            box.find(".table-b-headings table").width(box.find(".table").width());
        });

    }



</script>
