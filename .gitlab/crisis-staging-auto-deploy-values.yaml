replicaCount: 1
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
ingress:
  tls:
    enabled: true
  annotations:
    kubernetes.io/tls-acme: 'true'
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/client-body-buffer-size: 32m
  modSecurity:
    enabled: false
    secRuleEngine: DetectionOnly
service:
  externalPort: 5000
  internalPort: 8080
startupProbe:
  enabled: true
  path: "/health/live"
  probeType: "httpGet"
  scheme: "HTTP"
  initialDelaySeconds: 25
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 15
livenessProbe:
  path: "/health/live"
  initialDelaySeconds: 25
  timeoutSeconds: 15
  scheme: HTTP
  probeType: httpGet
readinessProbe:
  path: /healthz
  initialDelaySeconds: 30
  timeoutSeconds: 3
  scheme: HTTP
  probeType: httpGet
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
extraLabels:
  tenant: crisis
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: tenant
              operator: In
              values:
                - crisis
tolerations:
  - key: tenant
    operator: Equal
    value: crisis
    effect: NoSchedule
